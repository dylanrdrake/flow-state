<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowState — Reactive State Tree</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; max-width: 100vw; max-height: 100vh; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
  (function () {
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const DPR    = Math.min(window.devicePixelRatio || 1, 2);
    const W = 900, H = 530;

    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(DPR, DPR);

    const N = {
      app:  { label: 'KanbanApp',  sub: 'FlowState', x: 450, y: 72,  r: 34, fill: '#4338ca', rim: '#818cf8', level: 0 },
      col1: { label: 'Column',     sub: 'FlowState',       x: 150, y: 232, r: 25, fill: '#1d4ed8', rim: '#60a5fa', level: 1 },
      col2: { label: 'Column',     sub: 'FlowState',       x: 450, y: 232, r: 25, fill: '#1d4ed8', rim: '#60a5fa', level: 1 },
      col3: { label: 'Column',     sub: 'FlowState',       x: 750, y: 232, r: 25, fill: '#1d4ed8', rim: '#60a5fa', level: 1 },
      c11:  { label: 'Card', x: 66,  y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c12:  { label: 'Card', x: 150, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c13:  { label: 'Card', x: 234, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c21:  { label: 'Card', x: 366, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c22:  { label: 'Card', x: 450, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c23:  { label: 'Card', x: 534, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c31:  { label: 'Card', x: 666, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c32:  { label: 'Card', x: 750, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
      c33:  { label: 'Card', x: 834, y: 400, r: 17, fill: '#075985', rim: '#38bdf8', level: 2 },
    };

    const EDGES = [
      ['app','col1'], ['app','col2'], ['app','col3'],
      ['col1','c11'], ['col1','c12'], ['col1','c13'],
      ['col2','c21'], ['col2','c22'], ['col2','c23'],
      ['col3','c31'], ['col3','c32'], ['col3','c33'],
    ];

    const childOf = {}, parentOf = {};
    for (const id of Object.keys(N)) childOf[id] = [];
    for (const [f, t] of EDGES) { childOf[f].push(t); parentOf[t] = f; }

    const pulse = {};
    for (const id of Object.keys(N)) pulse[id] = 0;
    const particles = [];

    function cp(a, b) {
      return { x: (a.x + b.x) / 2 + (a.x < b.x ? -18 : 18), y: (a.y + b.y) / 2 };
    }
    function bpt(fId, tId, t) {
      const f = N[fId], to = N[tId], c = cp(f, to), u = 1 - t;
      return { x: u*u*f.x + 2*u*t*c.x + t*t*to.x, y: u*u*f.y + 2*u*t*c.y + t*t*to.y };
    }

    function spawnDown(fromId, color, size, delay) {
      for (const toId of childOf[fromId]) {
        setTimeout(() => {
          particles.push({ fromId, toId, t: 0, speed: 0.008 + Math.random() * 0.003, color, size,
            onArrive() {
              pulse[toId] = 1.0;
              if (childOf[toId].length) spawnDown(toId, color, size * 0.72, 55);
            },
          });
        }, delay ?? 0);
      }
    }

    function spawnUp(fromId, color, size) {
      const toId = parentOf[fromId];
      if (!toId) return;
      particles.push({ fromId, toId, t: 0, speed: 0.010 + Math.random() * 0.003, color, size,
        onArrive() { pulse[toId] = 1.0; spawnUp(toId, color, size); },
      });
    }

    function triggerUpdate() { pulse['app'] = 1.0; spawnDown('app', '#a5b4fc', 6.5, 100); }
    function triggerHook() {
      const cards = Object.keys(N).filter(id => N[id].level === 2);
      const src   = cards[Math.floor(Math.random() * cards.length)];
      pulse[src]  = 1.0;
      spawnUp(src, '#fbbf24', 5);
    }

    triggerUpdate();
    setInterval(triggerUpdate, 3600);
    setTimeout(() => { triggerHook(); setInterval(triggerHook, 4400); }, 2000);

    function rgb(hex) {
      return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
    }

    function drawEdges() {
      ctx.lineWidth = 1.5;
      for (const [fId, tId] of EDGES) {
        const f = N[fId], t = N[tId], c = cp(f, t);
        ctx.beginPath();
        ctx.moveTo(f.x, f.y);
        ctx.quadraticCurveTo(c.x, c.y, t.x, t.y);
        ctx.strokeStyle = '#1e293b';
        ctx.stroke();
      }
    }

    function drawParticle(p) {
      const pos = bpt(p.fromId, p.toId, p.t);
      for (let i = 1; i <= 7; i++) {
        const tp = bpt(p.fromId, p.toId, Math.max(0, p.t - i * 0.02));
        ctx.beginPath();
        ctx.arc(tp.x, tp.y, p.size * (1 - i/8) * 0.7, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${rgb(p.color)},${(1-i/8)*0.3})`;
        ctx.fill();
      }
      ctx.shadowBlur = 16; ctx.shadowColor = p.color;
      ctx.beginPath(); ctx.arc(pos.x, pos.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = p.color; ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawNode(id) {
      const n = N[id], p = pulse[id];
      if (p > 0.02) {
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + (1 - p) * 28, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${rgb(n.rim)},${p * 0.65})`;
        ctx.lineWidth = 2; ctx.stroke();
      }
      ctx.shadowBlur = 8 + p * 22; ctx.shadowColor = n.rim;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = n.fill; ctx.fill();
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(${rgb(n.rim)},${0.45 + p * 0.55})`;
      ctx.lineWidth = 1.5; ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (n.level === 0) {
        ctx.font = 'bold 12px system-ui'; ctx.fillStyle = '#f1f5f9';
        ctx.fillText(n.label, n.x, n.y - 7);
        ctx.font = '9px system-ui'; ctx.fillStyle = '#a5b4fc';
        ctx.fillText(n.sub, n.x, n.y + 7);
      } else if (n.level === 1) {
        ctx.font = 'bold 11px system-ui'; ctx.fillStyle = '#f1f5f9';
        ctx.fillText(n.label, n.x, n.y - 5);
        ctx.font = '9px system-ui'; ctx.fillStyle = '#93c5fd';
        ctx.fillText(n.sub, n.x, n.y + 6);
      } else {
        ctx.font = '9px system-ui'; ctx.fillStyle = '#bae6fd';
        ctx.fillText(n.label, n.x, n.y);
      }
    }

    function drawTitle() {
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = 'bold 22px system-ui'; ctx.fillStyle = '#e2e8f0';
      ctx.shadowBlur = 20; ctx.shadowColor = '#6366f1';
      ctx.fillText('FlowState', W/2, H - 58);
      ctx.shadowBlur = 0;
      ctx.font = '11px system-ui'; ctx.fillStyle = '#475569';
      ctx.fillText('reactive state cascades from parent scope → child scopes → watchers', W/2, H - 36);
    }

    function drawLegend() {
      const lx = 18, ly = H - 72;
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.font = '10px system-ui';
      for (const [i, [color, label]] of [['#a5b4fc','state update'],['#fbbf24','hook call']].entries()) {
        const y = ly + i * 18;
        ctx.shadowBlur = 8; ctx.shadowColor = color;
        ctx.beginPath(); ctx.arc(lx + 5, y, 4.5, 0, Math.PI*2);
        ctx.fillStyle = color; ctx.fill();
        ctx.shadowBlur = 0; ctx.fillStyle = '#64748b';
        ctx.fillText(label, lx + 14, y);
      }
    }

    let lastTs = 0;
    function frame(ts) {
      const dt = Math.min((ts - lastTs) / 16.67, 3);
      lastTs = ts;

      ctx.fillStyle = '#020617'; ctx.fillRect(0, 0, W, H);
      const vg = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(0,0,0,0.45)');
      ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

      drawEdges();

      for (const id of Object.keys(pulse)) pulse[id] = Math.max(0, pulse[id] - 0.020 * dt);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.t += p.speed * dt;
        if (p.t >= 1) { p.onArrive(); particles.splice(i, 1); }
        else drawParticle(p);
      }

      for (const id of Object.keys(N)) drawNode(id);
      drawTitle();
      drawLegend();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
